services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      UPLOAD_DIR: /app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "127.0.0.1:8000:8000"

volumes:
  uploads_data: